<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity App</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <!-- CDN lucide (iconos) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="assets/js/main.js" defer></script>
</head>

<body class="bg-background text-text">
    <content class="container mx-auto w-full h-screen flex border-x border-border">

        <aside class="hidden md:block bg-surface p-4 border-r border-border min-w-xs">
            <div class="flex items-center gap-4 justify-center mb-5">
                <img id="logoMenu" src="/assets/icons/logo_M_hex_bgW.svg" alt="Logo MACM HUB" class="h-15">
                <h2 class="font-title text-3xl font-semibold">MACM <span class="text-brand">HUB</span></h2>
            </div>
            <ul>
                <li class="mb-0.75"><a href="#"
                        class="flex px-2 py-4 rounded-md hover:bg-surface-hover hover:text-brand-hover"><i
                            data-lucide="House" class="mr-5"></i>Resumen</a></li>
                <li><a href="#" class="flex px-2 py-4 rounded-md bg-surface-hover text-brand-hover"><i
                            data-lucide="CalendarDays" class="mr-5"></i>Agenda</a></li>

            </ul>
            <div class="flex items-center">

                    <div class="bg-background-secondary border border-border rounded-xl p-1 flex items-center gap-2 m-1 cursor-pointer">
                        <div class="w-12 h-12 bg-background-tertiary border border-border rounded-full"></div>
                        <p>Miguel Angel</p>
                        <i data-lucide="ChevronUp"></i>
                    </div>
                    <div id="darkMode" class="mx-4 transition-colors duration-200 cursor-pointer">
                        <i id="themeIcon" data-lucide="moon"></i>
                    </div>
                </div>
        </aside>

        <main class="w-full">
            <header>
                <div>
                    <p class="text-4xl p-4 font-bold">Buenos días, Miguel Angel!</p>
                    <p id="currentDate" class="px-4 text-text-muted">Fecha</p>
                </div>
                

            </header>
        </main>

    </content>

</body>

</html>
